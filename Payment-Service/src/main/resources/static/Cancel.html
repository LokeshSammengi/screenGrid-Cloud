<!DOCTYPE html>
<html>
<head>
    <title>Payment Cancelled</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff4f4;
            text-align: center;
            padding-top: 100px;
        }
        .box {
            background: white;
            padding: 40px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #dc3545;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Payment Cancelled ❌</h1>
        <p>Your payment was cancelled.</p>
        <p>If this was a mistake, please try again.</p>
        <a href="/">Try Again</a>
    </div>
</body>
</html>
