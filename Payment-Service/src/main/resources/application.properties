spring.application.name=Payment-Service


#server port number
server.port=7063

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#To make Microservice connecting with 8888 port number
# Link config client with config server
spring.config.import=optional:configserver:

stripe.s-key=
stripe.webhook-s=

resilience4j.circuitbreaker.instances.bookingService.sliding-window-size=5
resilience4j.circuitbreaker.instances.bookingService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.bookingService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bookingService.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.bookingService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.bookingService.automatic-transition-from-open-to-half-open-enabled=true

#Actuators
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

#SPRING BOOT ADMIN DASHBOARD / UI
spring.boot.admin.client.url=http://localhost:9090
