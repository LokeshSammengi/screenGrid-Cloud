spring.application.name=APIGateway

#server port number
server.port=9999

#To connect with eureka client
eureka.client.service-url.default-zone=http://localhost:8761/eureka/

#Acuators properties
management.endpoints.web.exposure.include=*

#SPRING BOOT ADMIN DASHBOARD / UI
spring.boot.admin.client.url=http://localhost:9090

#api gateway properties--ROUTING Configuration

spring.cloud.gateway.server.routes[0].id=Booking-Microservice
spring.cloud.gateway.server.routes[0].uri=lb://Booking-Microservice
spring.cloud.gateway.server.routes[0].predicates[0]=Path=/bookings/**,/api/shows/**

spring.cloud.gateway.server.webflux.routes[1].id=Catalog-Service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://Catalog-Service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/catalog/**

spring.cloud.gateway.server.webflux.routes[2].id=Payment-Service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://Payment-Service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/payment/**,/api/paymentWebhook/**

spring.cloud.gateway.server.webflux.routes[3].id=User-Service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://User-Service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/user/**


